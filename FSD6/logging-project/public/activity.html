<!DOCTYPE html>
<html>
<head>
<title>Daily Activity</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Daily Activity Report</h2>

<button onclick="loadData()">Load Report</button>

<table border="1">
<thead>
<tr>
<th>Date</th>
<th>Action</th>
<th>Total</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

<script>

function loadData(){

fetch('/activity')
.then(res=>res.json())
.then(data=>{

let output=""

data.forEach(row=>{

output += `
<tr>
<td>${row.activity_date}</td>
<td>${row.action_type}</td>
<td>${row.total_actions}</td>
</tr>
`

})

document.getElementById("data").innerHTML=output

})

}

</script>

</body>
</html>
