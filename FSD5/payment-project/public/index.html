<!DOCTYPE html>
<html>
<head>

<title>Payment System</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>💳 Online Payment Simulation</h1>

<div class="card">

<h2>Balances</h2>

<p>User Balance: <span id="user"></span></p>
<p>Merchant Balance: <span id="merchant"></span></p>

<input type="number" id="amount" placeholder="Enter amount">

<button onclick="pay()">Pay Now</button>

<p id="msg"></p>

</div>


<div class="history">

<h2>Transaction History</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
