<!DOCTYPE html>
<html>
<head>
<title>Order Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Order Management System</h1>

<table id="orderTable">

<thead>
<tr>
<th>Customer</th>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
<th>Total</th>
<th>Date</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

fetch('/orders')
.then(res=>res.json())
.then(data=>{

let table=document.querySelector("#orderTable tbody");

data.forEach(order=>{

let row=`
<tr>
<td>${order.name}</td>
<td>${order.product_name}</td>
<td>${order.quantity}</td>
<td>${order.price}</td>
<td>${order.total_price}</td>
<td>${order.order_date}</td>
</tr>
`;

table.innerHTML+=row;

});

});

</script>

</body>
</html>
