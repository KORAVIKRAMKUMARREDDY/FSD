<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
</head>
<body>

<h2>Student Dashboard</h2>

<!-- FILTER -->
<select id="department">
    <option value="">All Departments</option>
    <option value="CSE">CSE</option>
    <option value="ECE">ECE</option>
    <option value="IT">IT</option>
</select>

<!-- SORT -->
<select id="sort">
    <option value="">Sort By</option>
    <option value="name">Name</option>
    <option value="date">Join Date</option>
</select>

<button onclick="loadStudents()">Apply</button>

<h3>Student Records</h3>

<table border="1">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Join Date</th>
        </tr>
    </thead>
    <tbody id="data"></tbody>
</table>

<h3>Department Count</h3>
<ul id="count"></ul>

<script>

function loadStudents() {

    const dept = document.getElementById("department").value;
    const sort = document.getElementById("sort").value;

    fetch(`http://localhost:3000/students?sort=${sort}&department=${dept}`)
    .then(res => res.json())
    .then(data => {

        let output = "";

        data.forEach(student => {
            output += `
                <tr>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.department}</td>
                    <td>${student.join_date.substring(0,10)}</td>
                </tr>
            `;
        });

        document.getElementById("data").innerHTML = output;
    });
}

function loadCount() {

    fetch("http://localhost:3000/department-count")
    .then(res => res.json())
    .then(data => {

        let output = "";

        data.forEach(row => {
            output += `<li>${row.department} : ${row.total}</li>`;
        });

        document.getElementById("count").innerHTML = output;
    });
}

loadStudents();
loadCount();

</script>

</body>
</html>
